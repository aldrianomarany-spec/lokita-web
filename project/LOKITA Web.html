  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-display: swap;\n  src: url(\"31c66900-7bd3-4f86-acdb-f952cf37574c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#0C1A3A;background:#F5F7FC;-webkit-font-smoothing:antialiased}\n  a{color:#1E50E5;text-decoration:none}\n  a:hover{color:#1740C4}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#D4DCEC;border-radius:8px;border:3px solid #F5F7FC}\n  @keyframes lok-rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}\n  @keyframes lok-pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}\n  @keyframes lok-fade{from{opacity:0}to{opacity:1}}\n  .lok-strip{background-image:repeating-linear-gradient(135deg,rgba(30,80,229,.10) 0 10px,rgba(30,80,229,.03) 10px 20px)}\n  .lok-card{transition:transform .15s ease,box-shadow .15s ease}\n  .lok-card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(12,26,58,.12)}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"height:100vh;display:flex;flex-direction:column;overflow:hidden\">\n\n  <!-- TOP BAR -->\n  <header style=\"height:66px;flex:none;background:#fff;border-bottom:1px solid #E4E9F2;display:flex;align-items:center;gap:22px;padding:0 26px;z-index:30\">\n    <div onclick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:10px;cursor:pointer\">\n      <div style=\"width:34px;height:34px;border-radius:10px;background:#1E50E5;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(30,80,229,.35)\">L<\u002Fdiv>\n      <div style=\"font-weight:800;font-size:19px;letter-spacing:-.02em\">LOKITA<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#5A6B8C;padding:3px 7px;background:#EAF0FF;border-radius:6px\">Lokal Kita<\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ toggleLocation }}\" title=\"Switch pickup building\" style=\"cursor:pointer;display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px;color:#0C1A3A;background:#F0F3FA;padding:8px 13px;border-radius:11px\"><span style=\"color:#1E50E5\">📍<\u002Fspan>{{ location }} <span style=\"color:#9AA6C0;font-weight:600;font-size:11px\">JIU · Cikarang ▾<\u002Fspan><\u002Fdiv>\n    <div style=\"flex:1;max-width:520px;display:flex;align-items:center;gap:10px;background:#F0F3FA;border-radius:13px;padding:11px 15px\">\n      <span style=\"color:#9AA6C0;font-size:15px\">🔍<\u002Fspan>\n      <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Search dorm items — desk, fridge, textbooks…\" style=\"flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14px;font-weight:500;color:#0C1A3A\">\n    <\u002Fdiv>\n    <div style=\"margin-left:auto;display:flex;align-items:center;gap:14px\">\n      <button onclick=\"{{ openSell }}\" style=\"border:none;background:#1E50E5;color:#fff;font-family:inherit;font-weight:700;font-size:14px;padding:11px 18px;border-radius:12px;cursor:pointer;box-shadow:0 4px 14px rgba(30,80,229,.3);display:flex;align-items:center;gap:7px\">＋ Sell an item<\u002Fbutton>\n      <div style=\"width:40px;height:40px;border-radius:11px;background:#F0F3FA;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer\">🔔<\u002Fdiv>\n      <div onclick=\"{{ goProfile }}\" style=\"width:40px;height:40px;border-radius:50%;background:#1E50E5;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;cursor:pointer\">A<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;overflow:hidden\">\n\n    <!-- SIDEBAR -->\n    <aside style=\"width:230px;flex:none;background:#fff;border-right:1px solid #E4E9F2;padding:18px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:22px\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#9AA6C0;padding:0 10px 8px;letter-spacing:.04em\">BROWSE<\u002Fdiv>\n        <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ n.go }}\" style=\"width:100%;border:none;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:11px;font-weight:700;font-size:14px;padding:11px 12px;border-radius:11px;background:{{ n.bg }};color:{{ n.fg }};margin-bottom:2px\"><span style=\"font-size:16px\">{{ n.icon }}<\u002Fspan>{{ n.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:10px;color:#9AA6C0;padding:0 10px 8px;letter-spacing:.04em\">CATEGORIES<\u002Fdiv>\n        <sc-for list=\"{{ cats }}\" as=\"c\" hint-placeholder-count=\"7\">\n          <button onclick=\"{{ c.select }}\" style=\"width:100%;border:none;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:11px;font-weight:600;font-size:13.5px;padding:9px 12px;border-radius:10px;background:{{ c.bg }};color:{{ c.fg }};margin-bottom:1px\"><span style=\"font-size:14px\">{{ c.icon }}<\u002Fspan>{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;background:linear-gradient(150deg,#1E50E5,#153bb8);border-radius:16px;padding:16px;color:#fff\">\n        <div style=\"font-size:13px;font-weight:700;margin-bottom:5px\">✓ Dorm-Verified<\u002Fdiv>\n        <div style=\"font-size:11.5px;line-height:1.5;color:#C9D6FF\">You're trading with real, rated neighbours. Dari kita, untuk kita.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- MAIN -->\n    <main style=\"flex:1;overflow-y:auto;padding:26px 30px\">\n\n      <!-- BROWSE -->\n      <sc-if value=\"{{ showBrowse }}\" hint-placeholder-val=\"{{ true }}\">\n        <div button onclick=\"{{ closeSell }}\" style=\"border:none;background:#F0F3FA;width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer;color:#5A6B8C\">✕<\u002Fbutton><\u002Fdiv>\n        <p style=\"font-size:13px;color:#8A96B4;font-weight:600;margin:0 0 18px\">Takes under a minute. Post it, drop it, done.<\u002Fp>\n        <div class=\"lok-strip\" style=\"height:120px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;border:1.5px dashed #B9C6E6\"><span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#1E50E5;opacity:.7\">+ drag photos here<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <input value=\"{{ f.title }}\" onchange=\"{{ onF.title }}\" placeholder=\"Item title\" style=\"background:#F0F3FA;border:1.5px solid transparent;border-radius:12px;padding:13px 15px;font-size:13.5px;font-family:inherit;font-weight:500;color:#0C1A3A;outline:none\" style-focus=\"border-color:#1E50E5;background:#fff\">\n          <div style=\"display:flex;gap:10px\">\n            <input value=\"{{ f.price }}\" onchange=\"{{ onF.price }}\" placeholder=\"Price (Rp)\" style=\"flex:1;background:#F0F3FA;border:1.5px solid transparent;border-radius:12px;padding:13px 15px;font-size:13.5px;font-family:inherit;font-weight:500;color:#0C1A3A;outline:none\" style-focus=\"border-color:#1E50E5;background:#fff\">\n            <select value=\"{{ f.cat }}\" onchange=\"{{ onF.cat }}\" style=\"flex:1;background:#F0F3FA;border:1.5px solid transparent;border-radius:12px;padding:13px 15px;font-size:13.5px;font-family:inherit;font-weight:600;color:#0C1A3A;outline:none;-webkit-appearance:none;appearance:none\" style-focus=\"border-color:#1E50E5;background:#fff\">\n              <option>Furniture<\u002Foption><option>Electronics<\u002Foption><option>Appliances<\u002Foption><option>Clothes<\u002Foption><option>Books<\u002Foption><option>Bundles<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <textarea value=\"{{ f.desc }}\" onchange=\"{{ onF.desc }}\" placeholder=\"Description\" style=\"background:#F0F3FA;border:1.5px solid transparent;border-radius:12px;padding:13px 15px;font-size:13.5px;font-family:inherit;font-weight:500;color:#0C1A3A;outline:none;min-height:64px;resize:none\" style-focus=\"border-color:#1E50E5;background:#fff\"><\u002Ftextarea>\n          <div onclick=\"{{ toggleBundle }}\" style=\"display:flex;align-items:center;gap:11px;background:#EAF0FF;border-radius:12px;padding:12px 14px;cursor:pointer\"><div style=\"width:38px;height:22px;border-radius:20px;background:{{ bundleTrack }};position:relative;flex:none;transition:background .2s ease\"><div style=\"position:absolute;top:2px;left:{{ bundleKnob }};width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s ease\"><\u002Fdiv><\u002Fdiv><div style=\"font-size:13px;font-weight:700\">Sell as Graduation Bundle<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ submitListing }}\" style=\"width:100%;border:none;background:{{ listBg }};color:#fff;font-family:inherit;font-weight:700;font-size:14.5px;padding:14px;border-radius:13px;cursor:pointer;margin-top:18px;transition:background .2s ease\">{{ listLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- TOAST -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeToast }}\" style=\"position:fixed;inset:0;background:rgba(12,26,58,.55);z-index:70;display:flex;align-items:center;justify-content:center;padding:40px;animation:lok-fade .2s ease both\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:22px;padding:32px 30px;text-align:center;width:100%;max-width:400px;animation:lok-pop .25s ease both;box-shadow:0 30px 80px rgba(12,26,58,.4)\">\n        <div style=\"width:64px;height:64px;border-radius:50%;background:#E7F7ED;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px\">✓<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:19px;margin-bottom:9px\">Payment held safely<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#5A6B8C;line-height:1.55;margin-bottom:20px\">Your money is in escrow. The seller will drop <b style=\"color:#0C1A3A\">{{ sel.title }}<\u002Fb> at the <b style=\"color:#0C1A3A\">{{ location }} Security Post<\u002Fb> — pick it up whenever suits you.<\u002Fdiv>\n        <button onclick=\"{{ closeToast }}\" style=\"width:100%;border:none;background:#1E50E5;color:#fff;font-family:inherit;font-weight:700;font-size:14.5px;padding:14px;border-radius:13px;cursor:pointer\">Got it<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { view:'browse', cat:'All', query:'', sel:null, chat:null, toast:false, sellOpen:false, location:'Thomas House', listState:'idle', bundleOn:false, f:{ title:'', price:'', cat:'Furniture', desc:'' } };\n\n  data() {\n    const items = [\n      { id:1, title:'Study Desk + Chair', price:'Rp 180.000', dorm:'Thomas House T108', cond:'Good', cat:'Furniture', rating:'4.9', seller:'Aldriano', sellerInitial:'A', photo:'desk + chair', mine:true, desc:'Sturdy wooden study desk with a matching chair. Barely used — selling because I graduate this term. Fits standard dorm rooms perfectly.' },\n      { id:2, title:'Mini Fridge 50L', price:'Rp 350.000', dorm:'Union Building U204', cond:'Like new', cat:'Appliances', rating:'5.0', seller:'Bimo S.', sellerInitial:'B', photo:'mini fridge', desc:'Compact 50L fridge, super quiet, keeps drinks cold. Perfect for late-night study snacks. Clean and fully working.' },\n      { id:3, title:'Whole Room — Graduation Bundle', price:'Rp 1.200.000', dorm:'Thomas House T108', cond:'Good', cat:'Bundles', rating:'4.9', seller:'Aldriano', sellerInitial:'A', photo:'bed · fan · desk · shelf', mine:true, isBundle:true, desc:'Everything in my room in one deal: single bed, standing fan, desk, chair and a shelf. Move-in ready for the next student. Grab it all and save.' },\n      { id:4, title:'Standing Fan', price:'Rp 90.000', dorm:'Union Building U112', cond:'Fair', cat:'Appliances', rating:'4.7', seller:'Citra D.', sellerInitial:'C', photo:'standing fan', desc:'Three-speed standing fan, works great through Cikarang heat. Small scuff on the base but runs perfectly.' },\n      { id:5, title:'IKEA Desk Lamp', price:'Rp 45.000', dorm:'Thomas House T110', cond:'Like new', cat:'Furniture', rating:'4.8', seller:'Dewi R.', sellerInitial:'D', photo:'desk lamp', desc:'Warm LED desk lamp, adjustable arm. Easy on the eyes for late study sessions.' },\n      { id:6, title:'Calculus + Physics Textbooks', price:'Rp 60.000', dorm:'Union Building U220', cond:'Good', cat:'Books', rating:'5.0', seller:'Eka W.', sellerInitial:'E', photo:'textbook bundle', desc:'First-year Calculus and Physics textbooks, minimal highlighting. Save a fortune vs. buying new.' },\n      { id:7, title:'JIU Hoodie — Size M', price:'Rp 85.000', dorm:'Thomas House T108', cond:'Like new', cat:'Clothes', rating:'4.9', seller:'Aldriano', sellerInitial:'A', photo:'campus hoodie', mine:true, desc:'Official JIU campus hoodie, size M. Worn twice — warm and barely used. Great for cold lecture halls.' },\n      { id:8, title:'Batik Shirt (Formal)', price:'Rp 55.000', dorm:'Union Building U118', cond:'Good', cat:'Clothes', rating:'4.8', seller:'Dewi R.', sellerInitial:'D', photo:'batik shirt', desc:'Formal batik shirt, size L. Perfect for campus presentations and formal events. Freshly laundered.' },\n      { id:9, title:'Bluetooth Speaker', price:'Rp 120.000', dorm:'Thomas House T118', cond:'Like new', cat:'Electronics', rating:'4.9', seller:'Fajar N.', sellerInitial:'F', photo:'bt speaker', desc:'Punchy portable Bluetooth speaker, great battery life. Ideal for dorm hangouts.' },\n      { id:10, title:'USB-C Charger 65W', price:'Rp 70.000', dorm:'Union Building U307', cond:'Like new', cat:'Electronics', rating:'4.8', seller:'Gilang H.', sellerInitial:'G', photo:'usb-c charger', desc:'Fast 65W USB-C charger, works with laptops and phones. Barely used spare.' },\n    ];\n    const wanted = [\n      { id:1, title:'Looking for a rice cooker under Rp 100k', budget:'≤ Rp 100.000', by:'Union Building', ago:'2h' },\n      { id:2, title:'Need an extension cord / power strip', budget:'≤ Rp 40.000', by:'Thomas House', ago:'5h' },\n      { id:3, title:'Standing mirror, any condition', budget:'≤ Rp 150.000', by:'Union Building', ago:'1d' },\n      { id:4, title:'Second-hand Statistics textbook', budget:'≤ Rp 50.000', by:'Thomas House', ago:'2d' },\n    ];\n    const chats = [\n      { id:1, name:'Bimo S.', initial:'B', item:'Mini Fridge 50L', last:'Sure, I can drop it today 👍', ago:'now', unread:true,\n        thread:[ {who:'them',text:'Hi! Is the mini fridge still available?'},{who:'me',text:'Yes it is! Like new, barely used.'},{who:'them',text:'Great. Can you drop it at the Security Post?'},{who:'me',text:'Sure, I can drop it today 👍'} ] },\n      { id:2, name:'Dewi R.', initial:'D', item:'IKEA Desk Lamp', last:'Paid! Picking up after class.', ago:'1h', unread:false,\n        thread:[ {who:'me',text:'Lamp is at the Thomas House post now.'},{who:'them',text:'Paid! Picking up after class.'} ] },\n      { id:3, name:'Eka W.', initial:'E', item:'Textbook bundle', last:'Is a small discount possible?', ago:'3h', unread:false,\n        thread:[ {who:'them',text:'Hi, interested in the textbooks.'},{who:'them',text:'Is a small discount possible?'} ] },\n    ];\n    return { items, wanted, chats };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const { items, wanted, chats } = this.data();\n    const catDefs = [\n      {label:'All', icon:'🧡'},{label:'Furniture', icon:'🪑'},{label:'Electronics', icon:'🔌'},\n      {label:'Appliances', icon:'❄️'},{label:'Clothes', icon:'👕'},{label:'Books', icon:'📚'},{label:'Bundles', icon:'🎓'},\n    ];\n    const navDefs = [\n      {key:'browse', label:'Marketplace', icon:'🛍️'},\n      {key:'wanted', label:'Wanted', icon:'🙋'},\n      {key:'chat', label:'Messages', icon:'💬'},\n      {key:'profile', label:'My profile', icon:'👤'},\n    ];\n\n    const q = s.query.trim().toLowerCase();\n    let list = items;\n    if (s.cat !== 'All') list = list.filter(i => i.cat === s.cat);\n    if (q) list = list.filter(i => (i.title + ' ' + i.cat).toLowerCase().includes(q));\n\n    const openItem = (it) => this.setState({ sel:it });\n    const closeDetail = () => this.setState({ sel:null });\n    const buy = () => this.setState({ toast:true });\n    const closeToast = () => this.setState({ toast:false, sel:null });\n    const setView = (v) => this.setState({ view:v, sel:null });\n    const openChat = (c) => this.setState({ chat:c });\n    const chatSeller = () => this.setState({ sel:null, view:'chat', chat:chats[0] });\n    const openSell = () => this.setState({ sellOpen:true });\n    const closeSell = () => this.setState({ sellOpen:false, listState:'idle', bundleOn:false, f:{ title:'', price:'', cat:'Furniture', desc:'' } });\n    const stop = (e) => e.stopPropagation();\n    const toggleLocation = () => this.setState({ location: s.location==='Thomas House' ? 'Union Building' : 'Thomas House' });\n    const setF = (k) => (e) => this.setState({ f:{ ...s.f, [k]:e.target.value } });\n    const submitListing = () => {\n      if (s.listState !== 'idle') return;\n      this.setState({ listState:'saving' });\n      setTimeout(() => { this.setState({ listState:'done' }); setTimeout(closeSell, 1000); }, 550);\n    };\n    const listLabel = s.listState==='saving' ? 'Posting…' : (s.listState==='done' ? 'Posted! ✓' : 'Post listing');\n    const listBg = s.listState==='done' ? '#16A34A' : '#1E50E5';\n\n    const nav = navDefs.map(n => {\n      const active = s.view === n.key;\n      return { ...n, go:()=>setView(n.key), bg: active ? '#EAF0FF' : 'transparent', fg: active ? '#1E50E5' : '#5A6B8C' };\n    });\n    const cats = catDefs.map(c => {\n      const active = s.cat === c.label;\n      return { ...c, select:()=>this.setState({cat:c.label, view:'browse'}), bg: active ? '#EAF0FF' : 'transparent', fg: active ? '#1E50E5' : '#5A6B8C' };\n    });\n\n    const mappedList = list.map(it => ({ ...it, open:()=>openItem(it) }));\n    const mappedMine = items.filter(i=>i.mine).map(it => ({ ...it, open:()=>openItem(it) }));\n    const mappedWanted = wanted.map(w => ({ ...w, reply:()=>chatSeller() }));\n    const activeChat = s.chat || chats[0];\n    const mappedChats = chats.map(c => ({ ...c, open:()=>openChat(c), bg: (c.id===activeChat.id) ? '#F5F8FF' : '#fff' }));\n    const thread = (activeChat.thread || []).map(m => ({\n      text:m.text, align: m.who==='me' ? 'flex-end':'flex-start',\n      bg: m.who==='me' ? '#1E50E5':'#fff', fg: m.who==='me' ? '#fff':'#0C1A3A',\n      radius: m.who==='me' ? '16px 16px 4px 16px':'16px 16px 16px 4px',\n    }));\n\n    const browseTitle = q ? ('Results for \"' + s.query + '\"') : (s.cat==='All' ? 'Marketplace' : s.cat);\n\n    return {\n      goHome:()=>this.setState({view:'browse', cat:'All', query:'', sel:null}),\n      goProfile:()=>setView('profile'), goWanted:()=>setView('wanted'),\n      query:s.query, onQuery:(e)=>this.setState({query:e.target.value, view:'browse'}),\n      location:s.location, toggleLocation,\n      showBrowse: s.view==='browse', showWanted: s.view==='wanted', showChat: s.view==='chat', showProfile: s.view==='profile',\n      browseTitle, resultCount:list.length, hasResults:list.length>0, noResults:list.length===0,\n      nav, navItems:nav, cats, list:mappedList, mine:mappedMine, wanted:mappedWanted, chats:mappedChats, thread, activeChat,\n      sel:s.sel || {}, toast:s.toast, sellOpen:s.sellOpen,\n      f:s.f, onF:{ title:setF('title'), price:setF('price'), cat:setF('cat'), desc:setF('desc') },\n      toggleBundle:()=>this.setState({bundleOn:!s.bundleOn}), bundleTrack: s.bundleOn ? '#16A34A' : '#F5A302', bundleKnob: s.bundleOn ? '18px' : '2px',\n      submitListing, listLabel, listBg,\n      openItem, closeDetail, buy, closeToast, openChat, chatSeller, openSell, closeSell, stop,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
