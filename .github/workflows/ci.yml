# Build check on every push and pull request — a change that doesn't compile
# can't sneak into main.
name: CI

on:
  push:
    branches: [main, lokita-web-v2]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # dummy values — the client only needs them to exist at build time
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder
